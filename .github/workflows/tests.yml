name: Tests — Todas las Ramas

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  tests:
    name: Pruebas en Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ["20", "22"]
      fail-fast: false

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npm run type-check

      - name: Lint del código
        run: npm run lint

      - name: Ejecutar pruebas con cobertura
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov --coverageReporters=json-summary

      - name: Resumen de cobertura
        if: always()
        run: |
          echo "## 📊 Cobertura de Tests" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const pct = k => s[k].pct;
              console.log('| Métrica | % |');
              console.log('|---------|---|');
              ['lines','statements','functions','branches'].forEach(k =>
                console.log(\`| \${k} | \${pct(k)}% |\`)
              );
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node }}
          path: coverage/
          retention-days: 14

  build:
    name: Build de producción
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción
        run: npm run build

      - name: Verificar tamaño del bundle
        run: |
          echo "## 📦 Tamaño del Bundle" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo | Tamaño |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          find dist/assets -type f \( -name "*.js" -o -name "*.css" \) | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Subir artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          retention-days: 7
